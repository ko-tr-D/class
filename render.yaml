services:
  - type: web
    name: class-learning-record-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        value: https://ko-tr-d.github.io
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
        sync: false
